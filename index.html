<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لُومو عرب</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000000, #1a1a1a);
  color: white;
  text-align: center;
}

/* شاشة البداية */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* زر الدخول */
button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: gold;
  color: black;
  cursor: pointer;
  margin-top: 20px;
}

/* iframe (التطبيق الحقيقي) */
#appFrame {
  display: none;
  width: 100%;
  height: 100vh;
  border: none;
}
</style>

</head>
<body>

<!-- شاشة البداية -->
<div id="startScreen">
  <h1>لُومو عرب</h1>
  <p>مرحباً بك في التطبيق</p>
  <button onclick="startApp()">دخول</button>
</div>

<!-- التطبيق -->
<iframe id="appFrame"
src="https://ais-pre-qh7p2mrjpiufls7d57l4ai-207184980423.europe-west1.run.app">
</iframe>

<script>
function startApp() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("appFrame").style.display = "block";
}
</script>

</body>
</html>
